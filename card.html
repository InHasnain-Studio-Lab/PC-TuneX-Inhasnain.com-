<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0A0E1A">
<title>A card for you</title>
<style>
  /* Everything is inline on purpose: this file must work from any host,
     including an offline LAN box, with no other files alongside it. */
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --from: #1A237E;
    --to: #000051;
    --accent: #FFD700;
    --ink: #FFFFFF;
    --ink-soft: rgba(255,255,255,.72);
    --ink-faint: rgba(255,255,255,.45);
    --rule: rgba(255,255,255,.22);
  }

  html, body { height: 100%; margin: 0; }

  body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #05070F;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 18px calc(24px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }

  .stage { width: 100%; max-width: 460px; }

  .card {
    position: relative;
    overflow: hidden;
    border-radius: 22px;
    padding: 40px 30px 34px;
    background: linear-gradient(150deg, var(--from), var(--to));
    box-shadow: 0 24px 60px rgba(0,0,0,.45);
    text-align: center;
    animation: rise .5s cubic-bezier(.2,.7,.3,1) both;
  }

  /* Soft light from the top so the flat gradient reads as a printed card. */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(120% 70% at 50% -10%, rgba(255,255,255,.20), transparent 60%);
    pointer-events: none;
  }

  .card > * { position: relative; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px) scale(.98); }
    to   { opacity: 1; transform: none; }
  }

  .to {
    font-size: 12px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 18px;
  }

  .mark {
    width: 42px;
    height: 3px;
    border-radius: 2px;
    background: var(--accent);
    margin: 0 auto 22px;
  }

  h1 {
    font-size: clamp(26px, 7vw, 34px);
    line-height: 1.2;
    font-weight: 700;
    letter-spacing: -.015em;
    margin: 0 0 20px;
    text-wrap: balance;
  }

  .message {
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink-soft);
    margin: 0;
    white-space: pre-wrap;
  }

  .rule {
    height: 1px;
    background: var(--rule);
    margin: 26px auto;
    max-width: 180px;
  }

  .signoff {
    font-size: 15px;
    color: var(--ink-soft);
    margin: 0;
  }

  .from {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    margin: 6px 0 0;
  }

  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 26px;
  }

  /* ---- business card ---- */

  .avatar {
    width: 86px;
    height: 86px;
    border-radius: 30px;
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: .02em;
    color: var(--ink);
    background: rgba(255,255,255,.16);
    border: 1px solid rgba(255,255,255,.3);
  }

  .role {
    font-size: 15px;
    color: var(--ink-soft);
    margin: 0;
  }

  .org {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin: 4px 0 0;
  }

  .details {
    list-style: none;
    margin: 24px 0 0;
    padding: 0;
    text-align: left;
  }

  .details li { border-top: 1px solid var(--rule); }
  .details li:last-child { border-bottom: 1px solid var(--rule); }

  .details a, .details .plain {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 14px 4px;
    min-height: 44px;
    color: var(--ink);
    text-decoration: none;
    font-size: 15px;
    word-break: break-word;
  }

  .details a:hover { color: var(--accent); }

  .details .label {
    flex: 0 0 74px;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .primary {
    background: var(--accent);
    border-color: transparent;
    color: #10131C;
  }

  .primary:hover { background: var(--accent); filter: brightness(1.08); }

  button {
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.28);
    border-radius: 22px;
    padding: 11px 20px;
    min-height: 44px;
    cursor: pointer;
    transition: background .18s ease;
  }

  button:hover { background: rgba(255,255,255,.24); }
  button:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 11.5px;
    color: rgba(255,255,255,.38);
  }

  .footer a { color: inherit; }

  .empty {
    max-width: 380px;
    margin: 0 auto;
    text-align: center;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  .empty h2 { color: var(--ink); font-size: 20px; margin: 0 0 10px; }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
  }

  @media print {
    body { background: #fff; padding: 0; }
    .actions, .footer { display: none; }
    .card { box-shadow: none; }
  }
</style>
</head>
<body>
<main class="stage" id="stage">
  <noscript>
    <div class="empty">
      <h2>This card needs JavaScript</h2>
      <p>The greeting is stored inside the link itself and is assembled in your browser. Turn JavaScript on and reload to read it.</p>
    </div>
  </noscript>
</main>

<script>
(function () {
  var stage = document.getElementById('stage');

  function decode(fragment) {
    var padded = fragment.replace(/-/g, '+').replace(/_/g, '/');
    while (padded.length % 4) padded += '=';
    var binary = atob(padded);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return JSON.parse(new TextDecoder().decode(bytes));
  }

  // Colours arrive as #AARRGGBB from the app; CSS wants #RRGGBBAA.
  function css(colour, fallback) {
    if (!colour) return fallback;
    var v = String(colour).trim();
    if (/^#[0-9a-f]{8}$/i.test(v)) return '#' + v.slice(3) + v.slice(1, 3);
    if (/^#[0-9a-f]{6}$/i.test(v) || /^#[0-9a-f]{3}$/i.test(v)) return v;
    return fallback;
  }

  function el(tag, cls, text) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    if (text != null) node.textContent = text;
    return node;
  }

  function showEmpty(heading, detail) {
    stage.innerHTML = '';
    var box = el('div', 'empty');
    box.appendChild(el('h2', null, heading));
    box.appendChild(el('p', null, detail));
    stage.appendChild(box);
    document.title = heading;
  }

  function paint(card, fromFallback, toFallback, accentFallback) {
    var root = document.documentElement.style;
    var backdrop = String(card.b || '').split('|');
    root.setProperty('--from', css(backdrop[0], fromFallback));
    root.setProperty('--to', css(backdrop[1] || backdrop[0], toFallback));
    root.setProperty('--accent', css(card.a, accentFallback));
  }

  function footer() {
    var node = el('p', 'footer');
    node.appendChild(document.createTextNode('This card was assembled in your browser. Nothing was uploaded. '));
    var link = el('a', null, 'Made with QR Creator Studio');
    link.href = 'https://www.hasnainstudiox.com';
    link.rel = 'noopener';
    node.appendChild(link);
    return node;
  }

  function initials(first, last) {
    var a = (first || '').trim().charAt(0);
    var b = (last || '').trim().charAt(0);
    var text = (a + b).toUpperCase();
    return text || '#';
  }

  // vCard 3.0, escaped per RFC 2426 so commas and semicolons survive.
  function vcard(card) {
    function esc(v) {
      return String(v || '')
        .replace(/\\/g, '\\\\').replace(/,/g, '\\,')
        .replace(/;/g, '\\;').replace(/\r?\n/g, '\\n');
    }
    var full = ((card.f || '') + ' ' + (card.l || '')).trim();
    var lines = ['BEGIN:VCARD', 'VERSION:3.0'];
    lines.push('N:' + esc(card.l) + ';' + esc(card.f) + ';;;');
    lines.push('FN:' + esc(full));
    if (card.o) lines.push('ORG:' + esc(card.o));
    if (card.j) lines.push('TITLE:' + esc(card.j));
    if (card.m) lines.push('TEL;TYPE=CELL:' + esc(card.m));
    if (card.w) lines.push('TEL;TYPE=WORK:' + esc(card.w));
    if (card.e) lines.push('EMAIL:' + esc(card.e));
    if (card.u) lines.push('URL:' + esc(card.u));
    if (card.ad) {
      var p = String(card.ad).split('|');
      lines.push('ADR;TYPE=WORK:;;' + esc(p[0]) + ';' + esc(p[1]) + ';' + esc(p[2]) + ';' + esc(p[3]) + ';' + esc(p[4]));
    }
    if (card.nt) lines.push('NOTE:' + esc(card.nt));
    lines.push('END:VCARD');
    return lines.join('\r\n');
  }

  function detailRow(list, label, value, href) {
    if (!value) return;
    var item = document.createElement('li');
    var row = el(href ? 'a' : 'span', href ? null : 'plain');
    if (href) { row.href = href; row.rel = 'noopener'; }
    row.appendChild(el('span', 'label', label));
    row.appendChild(el('span', null, value));
    item.appendChild(row);
    list.appendChild(item);
  }

  function renderBusiness(card) {
    paint(card, '#111827', '#0A0E1A', '#22D3EE');

    var full = ((card.f || '') + ' ' + (card.l || '')).trim();
    var article = el('article', 'card');

    article.appendChild(el('div', 'avatar', initials(card.f, card.l)));
    if (full) article.appendChild(el('h1', null, full));
    if (card.j) article.appendChild(el('p', 'role', card.j));
    if (card.o) article.appendChild(el('p', 'org', card.o));

    var list = el('ul', 'details');
    detailRow(list, 'Mobile', card.m, card.m ? 'tel:' + String(card.m).replace(/\s/g, '') : null);
    detailRow(list, 'Work', card.w, card.w ? 'tel:' + String(card.w).replace(/\s/g, '') : null);
    detailRow(list, 'Email', card.e, card.e ? 'mailto:' + card.e : null);

    if (card.u) {
      var url = /^https?:\/\//i.test(card.u) ? card.u : 'https://' + card.u;
      detailRow(list, 'Website', card.u, url);
    }

    if (card.ad) {
      var address = String(card.ad).split('|').filter(function (part) { return part && part.trim(); }).join(', ');
      detailRow(list, 'Address', address, address ? 'https://maps.google.com/?q=' + encodeURIComponent(address) : null);
    }

    detailRow(list, 'Note', card.nt, null);
    if (list.childNodes.length) article.appendChild(list);

    var actions = el('div', 'actions');

    // Rebuilding the contact file here keeps the phone's own add-contact sheet
    // one tap away, which is the part a plain web page would otherwise lose.
    var save = el('button', 'primary', 'Save to contacts');
    save.addEventListener('click', function () {
      var blob = new Blob([vcard(card)], { type: 'text/vcard;charset=utf-8' });
      var href = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = href;
      a.download = (full || 'contact').replace(/[^\w\- ]+/g, '') + '.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(href); }, 4000);
    });
    actions.appendChild(save);

    if (navigator.share) {
      var share = el('button', null, 'Share');
      share.addEventListener('click', function () {
        navigator.share({ title: full || 'Contact card', url: location.href }).catch(function () { });
      });
      actions.appendChild(share);
    }

    article.appendChild(actions);

    stage.innerHTML = '';
    stage.appendChild(article);
    stage.appendChild(footer());
    document.title = full ? full : 'Contact card';
  }

  function render(card) {
    paint(card, '#1A237E', '#000051', '#FFD700');

    var article = el('article', 'card');

    if (card.r) article.appendChild(el('p', 'to', 'For ' + card.r));
    article.appendChild(el('div', 'mark'));
    if (card.t) article.appendChild(el('h1', null, card.t));
    if (card.m) article.appendChild(el('p', 'message', card.m));

    if (card.s || card.n) {
      article.appendChild(el('div', 'rule'));
      if (card.s) article.appendChild(el('p', 'signoff', card.s));
      if (card.n) article.appendChild(el('p', 'from', card.n));
    }

    var actions = el('div', 'actions');

    if (navigator.share) {
      var share = el('button', null, 'Share');
      share.addEventListener('click', function () {
        navigator.share({ title: card.t || 'A card for you', url: location.href })
          .catch(function () { /* the person dismissed the sheet */ });
      });
      actions.appendChild(share);
    }

    var save = el('button', null, 'Save as image');
    save.addEventListener('click', function () { window.print(); });
    actions.appendChild(save);

    article.appendChild(actions);
    stage.innerHTML = '';
    stage.appendChild(article);
    stage.appendChild(footer());

    document.title = card.t ? card.t : 'A card for you';
  }

  function start() {
    var fragment = location.hash.replace(/^#/, '');
    if (!fragment) {
      showEmpty(
        'Nothing to show yet',
        'This page displays a card that is stored inside a QR code link. Scan a greeting code made with QR Creator Studio to see it.');
      return;
    }

    try {
      var card = decode(fragment);
      if (!card) throw new Error('no card');

      // Links made before the business card existed carry no kind, so an absent
      // kind still means a greeting.
      if (card.k === 'b') {
        if (!card.f && !card.l) throw new Error('empty contact');
        renderBusiness(card);
      } else {
        if (!card.t && !card.m) throw new Error('empty greeting');
        render(card);
      }
    } catch (e) {
      showEmpty(
        'This card could not be read',
        'The link looks incomplete. Scan the code again, and if it still fails ask the sender for a fresh one.');
    }
  }

  start();
  window.addEventListener('hashchange', start);
})();
</script>
</body>
</html>
